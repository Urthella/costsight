[server]
headless = true
runOnSave = true

[browser]
gatherUsageStats = false

[theme]
base = "light"
# Data-dense analytics palette (ui-ux-pro-max): blue primary + amber accent,
# soft off-white background (gentler than #FFFFFF under projector glare).
primaryColor = "#1E40AF"
backgroundColor = "#F8FAFC"
secondaryBackgroundColor = "#E9EEF6"
textColor = "#0F172A"
font = "sans serif"
